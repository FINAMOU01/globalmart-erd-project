        * `NGN` - NGN - Nigerian Naira
        * `GHS` - GHS - Ghanaian Cedi
        * `KES` - KES - Kenyan Shilling
        * `ZAR` - ZAR - South African Rand
        * `EGP` - EGP - Egyptian Pound
        * `MAD` - MAD - Moroccan Dirham

openapi: 3.0.3
info:
  title: AfriBazaar API
  version: 1.0.0
  description: Full CRUD API for AfriBazaar e-commerce platform
paths:
  /api/artisans/:
    get:
      operationId: api_artisans_list
      description: |-
        ViewSet for Artisan API endpoints.

        Supports full CRUD operations:
        - GET /api/artisans/ -> List all artisans
        - GET /api/artisans/<id>/ -> Get artisan details
        - POST /api/artisans/ -> Create new artisan (not recommended - use registration)
        - PUT /api/artisans/<id>/ -> Update entire artisan profile
        - PATCH /api/artisans/<id>/ -> Partial update
        - DELETE /api/artisans/<id>/ -> Delete artisan

        Custom actions:
        - GET /api/artisans/<id>/products/ -> Get artisan's products
        - GET /api/artisans/<id>/ratings/ -> Get artisan's ratings
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArtisanList'
          description: ''
    post:
      operationId: api_artisans_create
      description: |-
        ViewSet for Artisan API endpoints.


components:
  schemas:
    AccountStatusEnum:
      enum:
      - active
      - suspended
      - deleted
      - pending_verification
      type: string
      description: |-
        * `active` - Active
        * `suspended` - Suspended
        * `deleted` - Deleted
        * `pending_verification` - Pending Verification
    Artisan:
      type: object
      description: |-
        Serializer for Artisan user with profile information.
        Combines User and ArtisanProfile data.
      properties:
        user_id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          nullable: true
          maxLength: 100
        last_name:
          type: string
          nullable: true
          maxLength: 100
        is_artisan:
          type: boolean
          readOnly: true
        profile:
          allOf:
          - $ref: '#/components/schemas/ArtisanProfile'
          readOnly: true
        products_count:
          type: string
          readOnly: true
      required:
      - email
      - is_artisan
      - products_count
      - profile
      - user_id
      - username
    ArtisanProfile:
      type: object
      description: |-
        Serializer for Artisan Profile.
        Shows artisan details and rating stats.
      properties:
        id:
          type: integer
          readOnly: true
        phone:
          type: string
          maxLength: 15
        address:
          type: string
        bio:
          type: string
          description: Description of your artisan work and experience
        profile_picture:
          type: string
          format: uri
          nullable: true
        social_links:
          description: Social media links as JSON
        is_verified:
          type: boolean
        currency_preference:
          allOf:
          - $ref: '#/components/schemas/CurrencyPreferenceEnum'
          description: |-
            Your default currency for displaying dashboard values

            * `USD` - USD - US Dollar
            * `EUR` - EUR - Euro
            * `GBP` - GBP - British Pound
            * `XAF` - XAF - CFA Franc (Central)
            * `NGN` - NGN - Nigerian Naira
            * `GHS` - GHS - Ghanaian Cedi
            * `KES` - KES - Kenyan Shilling
            * `ZAR` - ZAR - South African Rand
            * `EGP` - EGP - Egyptian Pound
            * `MAD` - MAD - Moroccan Dirham
        date_joined:
          type: string
          format: date-time
          readOnly: true
        average_rating:
          type: string
          readOnly: true
        total_ratings:
          type: string
          readOnly: true
      required:
      - average_rating
      - date_joined
      - id
      - total_ratings
    ArtisanRating:
      type: object
      description: |-
        Serializer for Artisan ratings and reviews.
        Shows rating, comment, and rater information.
        Supports full CRUD operations.
      properties:
        rating_id:
          type: integer
          readOnly: true
        artisan_id:
          type: integer
          writeOnly: true
        artisan_name:
          type: string
          readOnly: true
        rater_id:
          type: integer
          writeOnly: true
        rater_username:
          type: string
          readOnly: true
        rater_name:
          type: string
          readOnly: true
        rating:
          allOf:
          - $ref: '#/components/schemas/RatingEnum'
          minimum: -2147483648
          maximum: 2147483647
        rating_display:
          type: string
          readOnly: true
        comment:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - artisan_name
      - created_at
      - rater_name
      - rater_username
      - rating
      - rating_display
      - rating_id
      - updated_at
    Cart:
      type: object
      description: Full CRUD serializer for carts table
      properties:
        cart_id:
          type: integer
          readOnly: true
        user_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        total_items:
          type: integer
          readOnly: true
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
      required:
      - cart_id
      - created_at
      - expires_at
      - subtotal
      - total_items
      - updated_at
      - user_id
    CartItem:
      type: object
      description: Full CRUD serializer for cart_items table
      properties:
        cart_item_id:
          type: integer
          readOnly: true
        cart_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        product_id:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        quantity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        unit_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        added_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - added_at
      - cart_id
      - cart_item_id
      - product_id
      - quantity
      - subtotal
      - unit_price
    Category:
      type: object
      description: |-
        Serializer for Category model.
        Includes basic info about product categories.
        Supports full CRUD operations.
      properties:
        category_id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - category_id
      - created_at
      - name
    Currency:
      type: object
      description: Full CRUD serializer for currencies table
      properties:
        currency_code:
          type: string
          readOnly: true
        currency_name:
          type: string
          maxLength: 50
        currency_symbol:
          type: string
          maxLength: 5
        is_active:
          type: boolean
        decimal_places:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - currency_code
      - currency_name
      - currency_symbol
    CurrencyCodeEnum:
      enum:

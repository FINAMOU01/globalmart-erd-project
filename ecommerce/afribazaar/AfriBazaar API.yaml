      enum:
      - USD
      - EUR
      - GBP
      - XAF
      - NGN
      - GHS
      - KES
      - ZAR
      - EGP
      - MAD
      type: string
      description: |-
        * `USD` - USD - US Dollar
        * `EUR` - EUR - Euro
        * `GBP` - GBP - British Pound
        * `XAF` - XAF - CFA Franc (Central)
        * `NGN` - NGN - Nigerian Naira
        * `GHS` - GHS - Ghanaian Cedi
        * `KES` - KES - Kenyan Shilling
        * `ZAR` - ZAR - South African Rand
        * `EGP` - EGP - Egyptian Pound
        * `MAD` - MAD - Moroccan Dirham
    CustomerTier:
      type: object
